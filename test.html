```html
<!DOCTYPE html>
<html>
<head>
<title>Online HTML Editor</title>

<style>
body{
font-family: Arial;
margin:0;
display:flex;
height:100vh;
}

.editor{
width:50%;
padding:10px;
background:#1e1e1e;
color:white;
}

textarea{
width:100%;
height:30%;
margin-bottom:10px;
background:#252526;
color:white;
border:none;
padding:10px;
font-size:14px;
}

iframe{
width:50%;
border:none;
background:white;
}

button{
padding:10px 20px;
background:#0078ff;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="editor">

<h3>HTML</h3>
<textarea id="html"></textarea>

<h3>CSS</h3>
<textarea id="css"></textarea>

<h3>JS</h3>
<textarea id="js"></textarea>

<button onclick="runCode()">Run Code</button>

</div>

<iframe id="preview"></iframe>

<script>

function runCode(){

let html = document.getElementById("html").value;
let css = "<style>"+document.getElementById("css").value+"</style>";
let js = "<script>"+document.getElementById("js").value+"<\/script>";

let output = html + css + js;

document.getElementById("preview").srcdoc = output;

}

</script>

</body>
</html>
